# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  CTN: '{{ .CTN | default "podman" }}'

includes:
  install: '/home/doku/dotfiles/taskfile/install.yaml'
  gh: '/home/doku/dotfiles/taskfile/gh.yaml'
  sync: '/home/doku/dotfiles/taskfile/sync.yaml'
  ctn: '/home/doku/dotfiles/taskfile/container.yaml'
  link: '/home/doku/dotfiles/taskfile/link.yaml'

tasks:
  ### common task
  harness:init:
    dir: "{{.USER_WORKING_DIR}}"
    vars:
      OCI: quay.io/ncdv/d3-tools:harness-0.0.1
    cmds:
      - "{{.CTN}} run --rm -v ./:/usr/src/app {{.OCI}}"

  software-hub:
    cmds:
      - "distrobox enter software-hub"

  dev-shell:
    cmds:
      - "toolbox enter dev-shell"

  pkg:bk:
    dir: /home/doku/onedrive/backup/dotfiles/
    vars:
      DST: /home/doku/onedrive/backup/dotfiles/
      HOME: /home/doku/
      AUR: "pacman-aur"
      NATIVE: "pacman-native"
    cmds:
      - "pacman -Qqen > {{.DST}}{{.AUR}}.txt"
      - "pacman -Qqem > {{.DST}}{{.NATIVE}}.txt"
      - "cp {{.HOME}}/Taskfile.yml {{.DST}}"
      - 'git add . && git commit -m "backup arch pkgs"'
      - "git push origin main"
