# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  prc:
    desc: create pr github
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - gh pr create -f

  prm:
    desc: merge pr github
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - gh pr merge -m -d

  sign-all:
    desc: sign all commits in git history
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - git rebase --exec "git commit --amend --no-edit -n -S" -i --root
