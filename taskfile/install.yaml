# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  package: &common
    vars: 
      PKG: "{{.PKG | default 'dnf' }}" # for fedora silver blue

  brew:
    desc: "brew install package"
    cmds:
      - for: ['1password-gui-linux', 'antigravity-ide-linux', 'antigravity-linux', 'stow', 'neovim', '1password-cli']
        cmd: "brew install {{.ITEM}} -y"

  bluefin:
    desc: "bluefin install"
    cmds:
      - ujust bluefin-cli

  flatpak:
    desc: "flatpak install package"
    cmds:
      - for: ['com.brave.Browser', 'com.discordapp.Discord', 'com.github.PintaProject.Pinta', 'com.github.tchx84.Flatseal', 'com.google.Chrome', 'io.missioncenter.MissionCenter', 'org.gnome.NautilusPreviewer', 'org.gnome.TextEditor', 'org.gnome.clocks', 'org.mozilla.firefox', 'org.mozilla.thunderbird_esr', 'org.telegram.desktop', 'org.videolan.VLC']
        cmd: "flatpak install flathub {{.ITEM}} -y"